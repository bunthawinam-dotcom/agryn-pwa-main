# Agryn — Agri Data Platform PWA (Netlify)
# Standalone Vite + React SPA. Frontend-only for now (mock data); wire the
# /api proxy below when the Agryn backend/gateway is live.

[build]
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  # Vite 6 needs Node 18+; pin to match local toolchain.
  NODE_VERSION = "22"

# --- API proxy (enable when backend is ready) ---
# Same-origin /api avoids CORS and lets a Domain=.dione.zone session cookie flow.
# [[redirects]]
#   from = "/api/*"
#   to = "https://dione-gateway.<env>.dione.zone/api/:splat"
#   status = 200
#   force = true

# SPA fallback — every non-file route serves index.html.
# (Static files like sw.js, manifest.webmanifest and /assets/* are served first.)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Hashed build assets are immutable — cache them hard.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must always revalidate so new deploys roll out immediately.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/registerSW.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Correct type + no stale caching for the web app manifest.
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=0, must-revalidate"
